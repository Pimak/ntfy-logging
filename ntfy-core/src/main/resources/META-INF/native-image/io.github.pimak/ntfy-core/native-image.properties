# GraalVM native-image configuration for ntfy-core, auto-discovered from this canonical
# META-INF/native-image/<groupId>/<artifactId>/ location by the native-image tool.
#
# --enable-url-protocols=https: ntfy-core reaches its ntfy server over HTTPS using the JDK
# HttpClient. native-image strips protocol handlers that are not proven reachable, and the
# https/TLS handler is one of them; without this flag a native binary throws
# "unknown protocol: https" the first time it publishes. HTTP-only ntfy servers do not need
# this, but registering https is the safe default for the real-world case.
#
# NOTE: this metadata is only for PLAIN GraalVM use of ntfy-core / ntfy-logback (a hand-rolled
# native build, or a non-Quarkus framework). The Quarkus native path needs NONE of this: the
# ntfy-quarkus extension creates the HttpClient at RUNTIME_INIT (see NtfyRecorder), so Quarkus'
# own substitutions register the URL protocols and the engine's threads/client are built at
# image run time, not build time.
Args = --enable-url-protocols=https
