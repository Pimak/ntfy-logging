# SAST: CodeQL over the Java sources (build-mode: none — no compilation needed) and over the
# workflow files themselves (the "actions" language catches ${{ }} injection and untrusted-input
# patterns). Alerts land in the repo's Security tab.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly-published CodeQL queries/CVE patterns re-check unchanged code.
    - cron: '30 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF results to code scanning
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, actions]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:${{ matrix.language }}"
