name: Release

# Tag-triggered publish pipeline. Fires ONLY on a v* tag the operator deliberately pushed
# (the point of no return — autoPublish=true means a validation-passing bundle goes live).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release, read the pushed tag
  packages: write   # publish the GitHub Packages mirror

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          # Single JDK 21 (deliberately not the 21-and-25 build sweep that ci.yml runs). The
          # release profile's javadoc:jar is the first CI javadoc build and JDK 25's doclint is
          # stricter (Pitfall B); the publish path must run only on the JDK the artifact targets.
          java-version: '21'
          # No `cache: maven` here (unlike ci.yml): the release job resolves everything cold from
          # Central so a poisoned branch-build cache entry can never feed jars into the signed,
          # auto-published bundle.
          # Import the GPG signing key so maven-gpg-plugin can sign the bundle.
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          # The env-var NAME (not the value); the value is injected per-step from the secret.
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          # Do NOT let setup-java write its own single-server settings.xml (Pitfall A) — we need
          # the two-server file below.
          overwrite-settings: false

      - name: Install two-server release settings
        run: |
          mkdir -p ~/.m2
          cp .github/release-settings.xml ~/.m2/settings.xml

      # The repo's ./mvnw is Maven 4 (4.0.0-rc-5). central-publishing-maven-plugin 0.11.0 does NOT
      # upload under Maven 4 — on `deploy` it stages the bundle to the local repo but its session
      # upload hook never fires, so the build goes green without publishing (this bit 0.1.0/0.1.1).
      # Pin Maven 3.9.x for the deploy legs. Checksum-verified download from the Apache archive.
      - name: Set up Maven 3.9 for publishing
        run: |
          set -euo pipefail
          MV=3.9.9
          # Pinned sha512 of apache-maven-3.9.9-bin.tar.gz — NOT fetched from the same origin as
          # the tarball, so a compromised download channel cannot supply both artifact and checksum.
          SHA512="a555254d6b53d267965a3404ecb14e53c3827c09c3b94b5678835887ab404556bfaf78dcfe03ba76fa2508649dca8531c74bca4d5846513522404d48e8c4ac8b"
          BASE="https://archive.apache.org/dist/maven/maven-3/${MV}/binaries/apache-maven-${MV}-bin.tar.gz"
          curl -fsSL "$BASE" -o /tmp/maven.tar.gz
          printf '%s  /tmp/maven.tar.gz\n' "$SHA512" | sha512sum -c -
          sudo tar -xzf /tmp/maven.tar.gz -C /opt
          echo "/opt/apache-maven-${MV}/bin" >> "$GITHUB_PATH"

      - name: Show Maven version (must be 3.9.x, not 4.x)
        run: mvn --version

      # Step A — BLOCKING. No continue-on-error: a failed Central deploy MUST turn the job red.
      # waitUntil=published (pom) makes this block until Central actually publishes, so a green run
      # means the artifact is live — not merely staged.
      - name: Publish to Maven Central
        run: mvn --batch-mode -P release deploy
        env:
          MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # Step B — BEST-EFFORT (D-11). continue-on-error lives ONLY on this GitHub Packages step,
      # NEVER on the Central step (Pitfall C): GitHub Packages permits republishing the same
      # version, Central's coordinates are immutable, so a transient GHP hiccup must not fail an
      # already-successful Central release. Try GITHUB_TOKEN first (Open Question 2); introduce a
      # scoped PAT only if this step fails on an auth/scope error — it is non-blocking, so that
      # can be observed on the first run rather than pre-solved.
      - name: Publish mirror to GitHub Packages
        continue-on-error: true
        run: mvn --batch-mode -P github-mirror deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Extract the CHANGELOG section for the tag being released (v0.1.1 -> ## [0.1.1]). Dynamic,
      # so future releases don't need this workflow edited.
      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v v="$VERSION" '$0 ~ "^## \\[" v "\\]" {flag=1; next} /^## \[/ {flag=0} flag' CHANGELOG.md)
          gh release create "${GITHUB_REF_NAME}" --notes "$NOTES" --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
