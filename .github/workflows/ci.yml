name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Fast leg: the whole multi-module reactor (ntfy-core, ntfy-logback, the Spring starter, and the
  # Quarkus runtime/deployment + integration-tests in JVM mode) on both supported JDKs.
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Build and test
        run: ./mvnw --batch-mode verify

  # Slow leg (the native smoke): GraalVM-native-compiles the Quarkus integration-tests app and runs
  # its @QuarkusIntegrationTest against the native binary — proof the extension works in a native
  # image (URL protocols, log handler install, engine boot at RUNTIME_INIT). This is the expensive
  # job (a native build is minutes, not seconds), so it runs once on JDK 21 only, not the full
  # matrix. Blocking (no continue-on-error): a native regression must turn CI red.
  native-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - name: Set up GraalVM (native-image)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
      - name: Native smoke (Quarkus integration-tests)
        # The deployment module MUST be in the -pl set: the runtime's quarkus-extension-maven-plugin
        # extension-descriptor goal verifies the deployment artifact's dependencies, and that
        # verification only resolves the correct deps when deployment is in the reactor session (in a
        # fresh CI repo it is otherwise unresolvable). -am then adds ntfy-core + ntfy-quarkus-runtime.
        # The native compile + @QuarkusIntegrationTest run against ./…-runner in integration-tests.
        run: ./mvnw -q --batch-mode verify -Dnative -pl ntfy-quarkus/integration-tests,ntfy-quarkus/deployment -am
