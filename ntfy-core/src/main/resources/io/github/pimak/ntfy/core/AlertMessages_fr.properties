# French translation of AlertMessages (example locale). UTF-8.
#
# Adding a language is a pure additive drop of one AlertMessages_xx.properties file with the FULL
# key set below, PLUS a matching entry in
# META-INF/native-image/io.github.pimak/ntfy-core/resource-config.json so GraalVM native builds ship
# the bundle. Rules enforced by AlertMessagesBundleSafetyTest:
#   * Never add a '{' placeholder to a no-placeholder key (labels + fixed status strings).
#   * In the MessageFormat pattern keys, DOUBLE every literal single quote as '' (French needs this
#     for l', d', etc.), and keep the same {0}/{1} argument set as the English base.

# --- Body labels (no placeholders; trailing space preserved) ---
label.message=Message : 
label.logger=Journaliseur : 
label.cause=Causé par : 
label.timestamp=Heure : 

# --- Fixed, credential-safe status/warning strings (no placeholders; single quotes OK) ---
status.disabledUnconfigured=moteur d'alerte ntfy non configuré (url/topic absents) — inactif
status.disabledPartialConfig=url définie mais topic manquant — moteur désactivé
status.tokenAndBasicBothSet=token et nom d'utilisateur/mot de passe configurés — le token est prioritaire
status.incompleteBasicAuth=nom d'utilisateur ou mot de passe défini mais pas les deux — l'authentification basic est incomplète ; publication SANS en-tête Authorization
status.credentialsOverPlainHttp=identifiants configurés avec une URL http:// en clair — le token/mot de passe et le contenu des alertes sont envoyés sans chiffrement ; utilisez https://
status.credentialsOverPlainHttpRefused=identifiants configurés avec une URL http:// en clair et require-https-for-credentials est activé — refus d'envoyer des identifiants non chiffrés ; utilisez https:// — moteur désactivé
status.invalidTopic=le topic n'est pas un nom de topic ntfy valide (autorisés : A-Z, a-z, 0-9, '-', '_' ; max 64 caractères) — moteur désactivé
status.invalidUrl=l'url n'est pas un point de terminaison http(s) valide (attendu http:// ou https:// avec un hôte) — moteur désactivé
status.invalidPriorityOrTags=la valeur priority/tags configurée contient des caractères ASCII non imprimables — l'en-tête invalide sera omis des publications
status.invalidSuppressionWindow=suppressionWindow doit être positif — retour à la valeur par défaut (3 minutes)
status.invalidConnectTimeout=connectTimeout doit être positif — retour à la valeur par défaut (5 secondes)
status.invalidRequestTimeout=requestTimeout doit être positif — retour à la valeur par défaut (10 secondes)
status.invalidAsyncQueueCapacity=asyncQueueCapacity doit être positif — retour au minimum (1)
status.asyncQueueOverflow=la file de distribution asynchrone ntfy est pleine — les alertes abandonnées sont regroupées dans le digest de tempête
publish.unexpectedError=la publication ntfy a échoué de manière inattendue

# --- MessageFormat pattern keys (literal single quotes DOUBLED as '') ---
status.active=moteur d''alerte ntfy ACTIF (url={0}, topic={1})
publish.failed.withStatus=échec de publication ntfy pour le topic ''{0}'' (HTTP {1})
publish.failed.noStatus=échec de publication ntfy pour le topic ''{0}''
status.exclusions.none=moteur d'alerte ntfy : aucun journaliseur exclu configuré
status.exclusions.list=moteur d''alerte ntfy, journaliseurs exclus : {0}
digest.title={0} — {1} erreurs supprimées
digest.body.summary={0} erreurs supprimées au cours des {1}
digest.body.loggerLine={0}x {1}
digest.body.overflow=+{0} autres
window.minute={0} minute
window.minutes={0} minutes
window.second={0} seconde
window.seconds={0} secondes
