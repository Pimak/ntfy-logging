# Baseline config for the integration-test app. The endpoint URL is intentionally NOT the real
# ntfy server: the loopback ntfy stand-in's dynamic port is injected by LoopbackNtfyTestResource
# (a QuarkusTestResourceLifecycleManager), which supplies quarkus.ntfy.url / quarkus.ntfy.topic
# for BOTH the in-JVM @QuarkusTest and the packaged @QuarkusIntegrationTest launch.
#
# A topic is set here so the app has a valid prod-profile default; the test resource overrides it.
quarkus.ntfy.topic=integration

# The engine rate-limiter would otherwise suppress a lone burst; give the smoke test headroom.
quarkus.ntfy.max-alerts-per-window=10

# NOTE: do not raise the root log level above INFO here. @QuarkusIntegrationTest launches the
# packaged app as a separate process and detects readiness by scraping the "Listening on:" startup
# line from its stdout; suppressing INFO hides that line and the launcher times out with
# "Unable to determine the status of the running process".
