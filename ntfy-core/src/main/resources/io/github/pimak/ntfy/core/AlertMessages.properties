# English base bundle for AlertMessages -- the source of truth AND the fallback for every locale.
#
# TWO KINDS OF KEYS:
#   * No-placeholder keys (labels + fixed status/warning strings) are returned VERBATIM by
#     AlertMessages.get(key) and are NEVER run through MessageFormat. They must contain no '{'
#     placeholder in any locale (a bundle-invariant test enforces this), which is exactly what
#     structurally guarantees a token/username/password can never be interpolated into them.
#     Literal single quotes are fine here (they are not MessageFormat patterns).
#   * MessageFormat pattern keys (the 5 composers + the window-description keys) ARE parsed by
#     java.text.MessageFormat, so every LITERAL single quote must be DOUBLED (''), and every
#     numeric argument is passed pre-formatted via String.valueOf(...) so no locale digit-grouping
#     is ever applied (English output stays byte-for-byte identical to the old hand-built strings).
#
# This file is UTF-8. Java 9+ loads .properties resource bundles as UTF-8, and the build declares
# project.build.sourceEncoding=UTF-8 with no resource filtering, so the em dash (—, U+2014) below is
# safe to store literally. When contributing a translation keep the file UTF-8 (or use \uXXXX
# escapes) and never let an editor re-save it as ISO-8859-1.

# --- Body labels (no placeholders; trailing space preserved via  ) ---
label.message=Message: 
label.logger=Logger: 
label.cause=Caused by: 
label.timestamp=Time: 

# --- Fixed, credential-safe status/warning strings (no placeholders) ---
status.disabledUnconfigured=ntfy alert engine not configured (url/topic unset) — inactive
status.disabledPartialConfig=url set but topic missing — engine disabled
status.tokenAndBasicBothSet=both token and username/password configured — token takes precedence
status.incompleteBasicAuth=username or password set but not both — basic auth is incomplete; publishing WITHOUT an Authorization header
status.credentialsOverPlainHttp=credentials configured with a plain http:// URL — the token/password and alert content are sent unencrypted; use https://
status.credentialsOverPlainHttpRefused=credentials configured with a plain http:// URL and require-https-for-credentials is enabled — refusing to send credentials unencrypted; use https:// — engine disabled
status.invalidTopic=topic is not a valid ntfy topic name (allowed: A-Z, a-z, 0-9, '-', '_'; max 64 chars) — engine disabled
status.invalidUrl=url is not a valid http(s) endpoint (expected http:// or https:// with a host) — engine disabled
status.invalidPriorityOrTags=configured priority/tags value contains non-printable-ASCII characters — the invalid header will be omitted from publishes
status.invalidSuppressionWindow=suppressionWindow must be positive — falling back to default (3 minutes)
status.invalidConnectTimeout=connectTimeout must be positive — falling back to default (5 seconds)
status.invalidRequestTimeout=requestTimeout must be positive — falling back to default (10 seconds)
status.invalidAsyncQueueCapacity=asyncQueueCapacity must be positive — falling back to the minimum (1)
status.asyncQueueOverflow=ntfy async delivery queue is full — dropped alerts are folded into the storm digest
publish.unexpectedError=ntfy publish threw unexpectedly

# --- MessageFormat pattern keys (literal single quotes MUST be doubled as '') ---
status.active=ntfy alert engine ACTIVE (url={0}, topic={1})
publish.failed.withStatus=ntfy publish failed for topic ''{0}'' (HTTP {1})
publish.failed.noStatus=ntfy publish failed for topic ''{0}''
status.exclusions.none=ntfy alert engine: no excluded loggers configured
status.exclusions.list=ntfy alert engine excluded loggers: {0}
digest.title={0} — {1} errors suppressed
digest.body.summary={0} errors suppressed in the last {1}
digest.body.loggerLine={0}x {1}
digest.body.overflow=+{0} others
window.minute={0} minute
window.minutes={0} minutes
window.second={0} second
window.seconds={0} seconds
