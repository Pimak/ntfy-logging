name: Feature request
description: Suggest an enhancement for ntfy-logging
labels: [enhancement]
body:
  - type: input
    id: logback-version
    attributes:
      label: Logback version
      placeholder: "1.5.38"
    validations:
      required: true
  - type: input
    id: jdk-version
    attributes:
      label: JDK version
      placeholder: "21"
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant XML configuration
      description: >-
        The `<appender>` block from your logback.xml/logback-spring.xml, if relevant
        to the request. Redact any real tokens/URLs before pasting.
      render: xml
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're hitting
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: false
